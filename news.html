<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News ｜ Particle design株式会社</title>
<meta name="description" content="Particle design株式会社からのお知らせ・ニュース一覧です。">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://particle-design.co.jp/news.html">
<meta name="theme-color" content="#111111">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20260624">
<style>
  /* News index — quiet document layout on the same design system */
  .legal-wrap { max-width: 64rem; margin-inline: auto; padding-block: clamp(7rem, 12vh, 10rem) clamp(4rem, 9vh, 7rem); }
  .legal-back {
    position: fixed; top: clamp(1.2rem, 3vw, 2rem); left: var(--gutter); z-index: 50;
    display: inline-flex; align-items: center; gap: .6em;
    font-size: .82rem; letter-spacing: .04em; color: var(--ink-soft);
    background: rgba(255,255,255,.72); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--line); border-radius: var(--radius);
    padding: .6em 1.1em; cursor: pointer; text-decoration: none;
    transition: color .3s ease, border-color .3s ease, background .3s ease;
  }
  .legal-back:hover { color: var(--ink); border-color: var(--line-mid); background: rgba(255,255,255,.95); }
  .legal-back .arrow { transition: transform .3s ease; }
  .legal-back:hover .arrow { transform: translateX(-4px); }

  .legal-head { margin-bottom: clamp(2.6rem, 5vw, 4rem); }
  .legal-head .eyebrow { justify-content: flex-start; }
  .legal-head h1 {
    font-family: var(--serif); font-weight: 300;
    font-size: clamp(1.9rem, 4vw, 2.9rem); line-height: 1.4; letter-spacing: -0.02em; margin: 0; color: var(--ink);
  }

  /* News — thumbnail card grid */
  .news-cards {
    list-style: none; margin: 0; padding: 0;
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: clamp(1.4rem, 3vw, 2.2rem);
  }
  .news-card { display: flex; flex-direction: column; text-decoration: none; }
  .news-card-thumb {
    aspect-ratio: 4 / 3;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-tint);
    border: 1px solid var(--line); border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .3s ease, transform .3s ease;
  }
  .news-card-thumb img { width: 42%; max-width: 120px; height: auto; transition: transform .35s ease; }
  .news-card:hover .news-card-thumb { border-color: var(--line-mid); }
  .news-card:hover .news-card-thumb img { transform: scale(1.04); }
  .news-card-body { padding-top: 1.1rem; display: flex; flex-direction: column; gap: .6rem; }
  .news-card-meta { display: flex; align-items: center; gap: .8rem; }
  .news-card-meta .news-date { font-size: .8rem; letter-spacing: .04em; color: var(--muted); font-variant-numeric: tabular-nums; }
  .news-card-meta .news-cat {
    font-size: .72rem; letter-spacing: .04em; color: var(--ink-soft);
    border: 1px solid var(--line-mid); border-radius: 999px; padding: .12rem .65rem;
  }
  .news-card-title { font-size: .95rem; line-height: 1.65; color: var(--ink); transition: color .3s ease; }
  .news-card:hover .news-card-title { color: var(--muted); }

  @media (max-width: 860px) { .news-cards { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .news-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<a class="legal-back" id="backBtn" href="/"><span class="arrow">←</span>戻る</a>

<main>
  <div class="shell legal-wrap">
    <div class="legal-head">
      <p class="eyebrow">News</p>
      <h1>お知らせ</h1>
    </div>

    <ul class="news-cards">
      <li>
        <a class="news-card" href="news-site-launch.html">
          <span class="news-card-thumb">
            <img src="logo-mark.png" alt="Particle design ロゴ">
          </span>
          <span class="news-card-body">
            <span class="news-card-meta">
              <time class="news-date" datetime="2026-06-01">2026.06.01</time>
              <span class="news-cat">お知らせ</span>
            </span>
            <span class="news-card-title">コーポレートサイトを公開しました。</span>
          </span>
        </a>
      </li>
    </ul>
  </div>
</main>

</body>
</html>
